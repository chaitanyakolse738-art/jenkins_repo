services:
  app:
    image: chaitanya057/notes-app:latest
    container_name: jenkins_test
    ports:
      - "4000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    networks:
      - jenkins

  mongo:
    image: mongo:7
    container_name: mongo_container
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=chaitya
      - MONGO_INITDB_ROOT_PASSWORD=passwordchaitya
      - MONGO_INITDB_DATABASE=mydatabase
    networks:
      - jenkins
    volumes:
      - mydata:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - jenkins


networks:
  jenkins:

volumes:
  mydata:

